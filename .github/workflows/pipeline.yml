name: Coffee Blog Pipeline

on:
  schedule:
    # 月・水・金 09:00 JST (= 00:00 UTC)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline (generate → legal-check → post)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NOTE_API_TOKEN: ${{ secrets.NOTE_API_TOKEN }}
        run: npm run pipeline

      - name: Commit generated.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated.json
          git diff --cached --quiet || git commit -m "chore: update generated.json [skip ci]"
          git push
